name: Deploy to Amazon ECS

on:
  push:
    branches: [ "main" ]

env:
  AWS_REGION: us-east-2
  ECR_REPOSITORY: payments-api-ecr
  ECS_SERVICE: payments-api-service-v2
  ECS_CLUSTER: payments-api-cluster
  ECS_TASK_DEFINITION: .aws/task-definition.json # Caminho para o arquivo ou nome da família
  CONTAINER_NAME: payments-api

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Login to AWS ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          # Exporta a URL da imagem para os próximos passos
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      # 🚀 PASSO NOVO: Baixa a Task Definition atual para garantir continuidade
      - name: Download task definition
        run: |
          aws ecs describe-task-definition --task-definition payments-api-task --query taskDefinition > task-definition.json

      # 🚀 PASSO NOVO: Atualiza o ID da imagem no JSON da Task Definition
      - name: Fill in the new image ID in the Amazon ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      # 🚀 Deploy ECS
      - name: Force ECS Update
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      # 🚀 Deploy ECS
      - name: Deploy ECS
        run: |
          aws ecs update-service \
            --cluster ECS_CLUSTER \
            --service ECS_SERVICE \
            --force-new-deployment

      - name: Wait stable
        run: |
          aws ecs wait services-stable \
            --cluster ECS_CLUSTER \
            --services ECS_SERVICE